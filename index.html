<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gig Sanity — 90-Day Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f2;color:#2C2C2A;min-height:100vh}
  .header{background:#D4490A;color:white;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
  .header-sub{font-size:12px;opacity:0.85;margin-top:2px}
  .signout{background:rgba(255,255,255,0.2);border:none;color:white;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer}
  .nav{display:flex;background:white;border-bottom:1px solid #e0ddd8}
  .nav-btn{flex:1;padding:14px;border:none;background:none;font-size:14px;font-weight:500;color:#888780;cursor:pointer;border-bottom:3px solid transparent}
  .nav-btn.active{color:#D4490A;border-bottom-color:#D4490A}
  .screen{display:none;padding:20px;max-width:480px;margin:0 auto}
  .screen.active{display:block}
  .card{background:white;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #e8e6e0}
  .card-title{font-size:13px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px}
  .score-row{display:flex;gap:8px;margin-bottom:4px}
  .score-btn{flex:1;padding:12px 4px;border:2px solid #e0ddd8;border-radius:8px;background:white;cursor:pointer;text-align:center;transition:all 0.15s}
  .score-btn .num{font-size:22px;font-weight:700;display:block}
  .score-btn .lbl{font-size:10px;color:#888780;display:block;margin-top:2px}
  .score-btn.selected-1{border-color:#A32D2D;background:#FCEBEB}.score-btn.selected-1 .num{color:#A32D2D}
  .score-btn.selected-2{border-color:#BA7517;background:#FAEEDA}.score-btn.selected-2 .num{color:#BA7517}
  .score-btn.selected-3{border-color:#888780;background:#F5F4F2}.score-btn.selected-3 .num{color:#2C2C2A}
  .score-btn.selected-4{border-color:#1D9E75;background:#E1F5EE}.score-btn.selected-4 .num{color:#0F6E56}
  .score-btn.selected-5{border-color:#0F6E56;background:#E1F5EE}.score-btn.selected-5 .num{color:#0F6E56}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;color:#2C2C2A;margin-bottom:6px}
  .field textarea{width:100%;padding:10px 12px;border:1.5px solid #e0ddd8;border-radius:8px;font-size:15px;font-family:inherit;resize:none;min-height:72px}
  .field textarea:focus{outline:none;border-color:#D4490A}
  .btn-primary{width:100%;padding:15px;background:#D4490A;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed}
  .btn-primary:active{transform:scale(0.98)}
  .log-item{border-left:4px solid #D4490A;padding:12px 14px;background:white;border-radius:0 8px 8px 0;margin-bottom:10px}
  .log-date{font-size:12px;color:#888780;margin-bottom:4px}
  .log-scores{display:flex;gap:16px;margin-bottom:4px}
  .log-score{font-size:13px;font-weight:600}
  .log-note{font-size:13px;color:#5F5E5A;font-style:italic}
  .empty{text-align:center;padding:40px 20px;color:#888780}
  .empty-icon{font-size:40px;margin-bottom:12px}
  .stat-row{display:flex;gap:12px;margin-bottom:16px}
  .stat{flex:1;background:#FDF0EB;border-radius:8px;padding:14px;text-align:center}
  .stat .val{font-size:28px;font-weight:700;color:#D4490A}
  .stat .lbl{font-size:11px;color:#888780;margin-top:2px;text-transform:uppercase;letter-spacing:0.05em}
  .auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#2C2C2A}
  .auth-card{background:white;border-radius:16px;padding:32px 28px;width:100%;max-width:380px}
  .auth-logo{font-size:32px;font-weight:800;color:#D4490A;margin-bottom:4px}
  .auth-sub{font-size:14px;color:#888780;margin-bottom:28px;line-height:1.5}
  .auth-input{width:100%;padding:12px 14px;border:1.5px solid #e0ddd8;border-radius:8px;font-size:15px;margin-bottom:12px;font-family:inherit}
  .auth-input:focus{outline:none;border-color:#D4490A}
  .btn-google{width:100%;padding:13px;background:white;border:1.5px solid #e0ddd8;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
  .divider{text-align:center;color:#888780;font-size:13px;margin:12px 0;position:relative}
  .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#e0ddd8}
  .divider::before{left:0}.divider::after{right:0}
  .auth-toggle{text-align:center;font-size:13px;color:#888780;margin-top:14px}
  .auth-toggle span{color:#D4490A;cursor:pointer;font-weight:600}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:white;padding:10px 20px;border-radius:8px;font-size:14px;z-index:999;display:none}
  .streak{display:flex;align-items:center;gap:8px;background:#FDF0EB;border-radius:8px;padding:12px 16px;margin-bottom:16px}
  .streak-num{font-size:32px;font-weight:800;color:#D4490A}
  .streak-txt{font-size:13px;color:#5F5E5A;line-height:1.4}
  canvas{max-height:200px}
</style>
</head>
<body>

<div id="authScreen" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Gig Sanity</div>
    <div class="auth-sub">Your 90-day companion to<br>The Gig Worker's Sanity Manual</div>
    <button class="btn-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
      Continue with Google
    </button>
    <div class="divider">or</div>
    <div id="emailForm">
      <input class="auth-input" type="email" id="emailInput" placeholder="Email address">
      <input class="auth-input" type="password" id="passInput" placeholder="Password">
      <button class="btn-primary" id="emailBtn">Sign In</button>
      <div class="auth-toggle">No account? <span id="toggleAuth">Sign up</span></div>
    </div>
  </div>
</div>

<div id="appScreen" style="display:none">
  <div class="header">
    <div>
      <div class="header h1" style="font-size:18px;font-weight:700;color:white">Gig Sanity</div>
      <div class="header-sub" id="userEmail"></div>
    </div>
    <button class="signout" id="signoutBtn">Sign out</button>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('log')">Log Today</button>
    <button class="nav-btn" onclick="showTab('history')">History</button>
    <button class="nav-btn" onclick="showTab('chart')">90-Day Chart</button>
  </div>

  <div id="tab-log" class="screen active">
    <div class="card">
      <div class="card-title">Sanity Score — circle one</div>
      <div class="score-row" id="sanityBtns">
        <button class="score-btn" onclick="selectScore('sanity',1)"><span class="num">1</span><span class="lbl">Crisis</span></button>
        <button class="score-btn" onclick="selectScore('sanity',2)"><span class="num">2</span><span class="lbl">Rough</span></button>
        <button class="score-btn" onclick="selectScore('sanity',3)"><span class="num">3</span><span class="lbl">Holding</span></button>
        <button class="score-btn" onclick="selectScore('sanity',4)"><span class="num">4</span><span class="lbl">Stable</span></button>
        <button class="score-btn" onclick="selectScore('sanity',5)"><span class="num">5</span><span class="lbl">Resilient</span></button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Algorithm Pressure — mark one</div>
      <div class="score-row" id="pressureBtns">
        <button class="score-btn" onclick="selectScore('pressure',1)"><span class="num">1</span><span class="lbl">None</span></button>
        <button class="score-btn" onclick="selectScore('pressure',2)"><span class="num">2</span><span class="lbl">Low</span></button>
        <button class="score-btn" onclick="selectScore('pressure',3)"><span class="num">3</span><span class="lbl">Medium</span></button>
        <button class="score-btn" onclick="selectScore('pressure',4)"><span class="num">4</span><span class="lbl">High</span></button>
        <button class="score-btn" onclick="selectScore('pressure',5)"><span class="num">5</span><span class="lbl">Max</span></button>
      </div>
    </div>
    <div class="card">
      <div class="field">
        <label>What created pressure today? (optional)</label>
        <textarea id="noteInput" placeholder="Facts only — no narrative required"></textarea>
      </div>
      <button class="btn-primary" id="submitBtn" onclick="submitLog()">Submit Today's Log</button>
    </div>
  </div>

  <div id="tab-history" class="screen">
    <div id="streakBox" class="streak" style="display:none">
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-txt"><strong>day streak</strong><br>Keep logging daily</div>
    </div>
    <div id="historyList"></div>
  </div>

  <div id="tab-chart" class="screen">
    <div class="card">
      <div class="card-title">Sanity Score — 90 days</div>
      <canvas id="sanityChart"></canvas>
    </div>
    <div class="card">
      <div class="card-title">Algorithm Pressure — 90 days</div>
      <canvas id="pressureChart"></canvas>
    </div>
    <div class="stat-row" id="statsRow" style="display:none">
      <div class="stat"><div class="val" id="avgSanity">-</div><div class="lbl">Avg Sanity</div></div>
      <div class="stat"><div class="val" id="avgPressure">-</div><div class="lbl">Avg Pressure</div></div>
      <div class="stat"><div class="val" id="totalLogs">-</div><div class="lbl">Days Logged</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, orderBy, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNw0IBQSMr7jYH1cDTxJCH84arel0S1vI",
  authDomain: "gigsanity.firebaseapp.com",
  projectId: "gigsanity",
  storageBucket: "gigsanity.firebasestorage.app",
  messagingSenderId: "737759998082",
  appId: "1:737759998082:web:9bf240abd61ad5a969449b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let sanityScore = 0;
let pressureScore = 0;
let sanityChartInst = null;
let pressureChartInst = null;

window.selectScore = (type, val) => {
  if(type === 'sanity') {
    sanityScore = val;
    document.querySelectorAll('#sanityBtns .score-btn').forEach((b,i) => {
      b.className = 'score-btn' + (i+1===val ? ' selected-'+val : '');
    });
  } else {
    pressureScore = val;
    document.querySelectorAll('#pressureBtns .score-btn').forEach((b,i) => {
      b.className = 'score-btn' + (i+1===val ? ' selected-'+val : '');
    });
  }
};

window.showTab = (tab) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  event.target.classList.add('active');
  if(tab==='history') loadHistory();
  if(tab==='chart') loadChart();
};

window.submitLog = async () => {
  if(!sanityScore || !pressureScore) { showToast('Please select both scores'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    await addDoc(collection(db,'logs'), {
      uid: currentUser.uid,
      email: currentUser.email,
      sanityScore,
      pressureScore,
      note: document.getElementById('noteInput').value.trim(),
      date: Timestamp.now()
    });
    showToast('Logged! Day complete.');
    sanityScore = 0; pressureScore = 0;
    document.getElementById('noteInput').value = '';
    document.querySelectorAll('.score-btn').forEach(b => b.className = 'score-btn');
  } catch(e) { showToast('Error saving. Try again.'); }
  btn.disabled = false; btn.textContent = 'Submit Today\'s Log';
};

async function loadHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>Loading...</div>';
  const q = query(collection(db,'logs'), where('uid','==',currentUser.uid), orderBy('date','desc'));
  const snap = await getDocs(q);
  if(snap.empty) { list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>No logs yet.<br>Log your first day above.</p></div>'; return; }
  const scoreLabels = ['','Crisis','Rough','Holding','Stable','Resilient'];
  let html = '';
  snap.forEach(doc => {
    const d = doc.data();
    const dt = d.date.toDate();
    const dateStr = dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    html += `<div class="log-item">
      <div class="log-date">${dateStr}</div>
      <div class="log-scores">
        <span class="log-score">Sanity: ${d.sanityScore}/5 — ${scoreLabels[d.sanityScore]}</span>
        <span class="log-score" style="color:#888780">Pressure: ${d.pressureScore}/5</span>
      </div>
      ${d.note ? `<div class="log-note">${d.note}</div>` : ''}
    </div>`;
  });
  list.innerHTML = html;
  const streak = calcStreak(snap.docs.map(d => d.data().date.toDate()));
  if(streak > 0) {
    document.getElementById('streakBox').style.display = 'flex';
    document.getElementById('streakNum').textContent = streak;
  }
}

function calcStreak(dates) {
  const days = [...new Set(dates.map(d => d.toDateString()))].map(d => new Date(d)).sort((a,b) => b-a);
  let streak = 0; let check = new Date(); check.setHours(0,0,0,0);
  for(let d of days) {
    const day = new Date(d); day.setHours(0,0,0,0);
    if(day.getTime() === check.getTime()) { streak++; check.setDate(check.getDate()-1); }
    else if(day.getTime() === check.getTime()+86400000) { continue; }
    else break;
  }
  return streak;
}

async function loadChart() {
  const q = query(collection(db,'logs'), where('uid','==',currentUser.uid), orderBy('date','asc'));
  const snap = await getDocs(q);
  if(snap.empty) return;
  const labels = [], sanity = [], pressure = [];
  snap.forEach(doc => {
    const d = doc.data();
    labels.push(d.date.toDate().toLocaleDateString('en-US',{month:'short',day:'numeric'}));
    sanity.push(d.sanityScore);
    pressure.push(d.pressureScore);
  });
  const cfg = (data, color, label) => ({
    type:'line', data:{labels, datasets:[{label, data, borderColor:color, backgroundColor:color+'22', tension:0.3, fill:true, pointRadius:3}]},
    options:{responsive:true, scales:{y:{min:1,max:5,ticks:{stepSize:1}}}, plugins:{legend:{display:false}}}
  });
  if(sanityChartInst) sanityChartInst.destroy();
  if(pressureChartInst) pressureChartInst.destroy();
  sanityChartInst = new Chart(document.getElementById('sanityChart'), cfg(sanity,'#D4490A','Sanity Score'));
  pressureChartInst = new Chart(document.getElementById('pressureChart'), cfg(pressure,'#2C2C2A','Algorithm Pressure'));
  document.getElementById('statsRow').style.display = 'flex';
  document.getElementById('avgSanity').textContent = (sanity.reduce((a,b)=>a+b,0)/sanity.length).toFixed(1);
  document.getElementById('avgPressure').textContent = (pressure.reduce((a,b)=>a+b,0)/pressure.length).toFixed(1);
  document.getElementById('totalLogs').textContent = sanity.length;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(()=>t.style.display='none', 3000);
}

let isSignUp = false;
document.getElementById('toggleAuth').onclick = () => {
  isSignUp = !isSignUp;
  document.getElementById('emailBtn').textContent = isSignUp ? 'Create Account' : 'Sign In';
  document.getElementById('toggleAuth').textContent = isSignUp ? 'Sign in instead' : 'Sign up';
  document.querySelector('.auth-toggle').firstChild.textContent = isSignUp ? 'Have an account? ' : 'No account? ';
};

document.getElementById('googleBtn').onclick = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { showToast('Google sign-in failed. Try email.'); }
};

document.getElementById('emailBtn').onclick = async () => {
  const email = document.getElementById('emailInput').value;
  const pass = document.getElementById('passInput').value;
  if(!email||!pass) { showToast('Enter email and password'); return; }
  try {
    if(isSignUp) await createUserWithEmailAndPassword(auth, email, pass);
    else await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) { showToast(e.message.replace('Firebase: ','').replace(/ \(auth.*\)/,'')); }
};

document.getElementById('signoutBtn').onclick = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if(user) {
    currentUser = user;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    document.getElementById('userEmail').textContent = user.email || user.displayName || '';
  } else {
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }
});
</script>
</body>
</html>
